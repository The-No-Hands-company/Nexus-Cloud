version: "3.9"

# Nexus Cloud — sovereign, self-hosted, federated cloud infrastructure.
#
# Default stack (docker compose up):
#   nexus-cloud   — the API + registry server
#   caddy         — HTTPS reverse proxy with On-Demand TLS per subdomain
#   coredns       — authoritative DNS for the cloud domain (sovereign mode)
#
# After DNS delegation (change nameservers at your registrar, add glue records),
# this stack is the entire internet-facing infrastructure with no third-party
# dependencies. No Cloudflare. No Route53. No registrar API calls ever again.
#
# Optional Cloudflare DNS bootstrap (profile: cloudflare):
#   docker compose --profile cloudflare run --rm dns-bootstrap
# Use this only during the transition period before you've set glue records.

services:
  # ── CoreDNS — sovereign authoritative nameserver ─────────────────────────────
  # Serves the cloud domain from a zone file generated by Nexus Cloud.
  # The zone file is written to the shared volume on startup and rebuilt every
  # time a new route is registered. CoreDNS reloads it every 30 seconds.
  #
  # One-time registrar setup (do this before going live):
  #   1. Change the domain's nameservers to: ns1.nexus.cloud  ns2.nexus.cloud
  #   2. Add glue A records at the registrar: both ns1 and ns2 → SERVER_PUBLIC_IP
  #   After propagation (up to 48h) this server IS the DNS authority. No
  #   third-party DNS provider is involved in any subsequent subdomain creation.
  coredns:
    image: coredns/coredns:latest
    container_name: nexus-cloud-coredns
    command: ["-conf", "/etc/coredns/Corefile"]
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    environment:
      NEXUS_CLOUD_DOMAIN: "${NEXUS_CLOUD_DOMAIN:-nexus.local}"
    volumes:
      - ./caddy/Corefile:/etc/coredns/Corefile:ro
      - nexus_cloud_data:/data
    depends_on:
      nexus-cloud:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus

  # ── Caddy — TLS termination and subdomain routing ─────────────────────────────
  # Handles HTTPS for nexus.cloud and *.nexus.cloud.
  # Uses Caddy On-Demand TLS: a separate Let's Encrypt cert is issued for each
  # subdomain on first request. The tls-ask endpoint prevents cert-bomb attacks.
  # Proxies all traffic to nexus-cloud, which resolves the subdomain and
  # reverse-proxies to the registered NS tool upstream.
  caddy:
    image: caddy:2-alpine
    container_name: nexus-cloud-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      NEXUS_CLOUD_DOMAIN: "${NEXUS_CLOUD_DOMAIN:-nexus.local}"
      ACME_EMAIL: "${ACME_EMAIL:-}"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      nexus-cloud:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexus

  nexus-cloud:
    build: .
    container_name: nexus-cloud
    ports:
      - "${PORT:-8787}:${PORT:-8787}"
    environment:
      PORT: "${PORT:-8787}"
      NEXUS_CLOUD_API_KEY: "${NEXUS_CLOUD_API_KEY:-}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      NEXUS_CLOUD_DOMAIN: "${NEXUS_CLOUD_DOMAIN:-nexus.local}"
      NEXUS_CLOUD_URL: "${NEXUS_CLOUD_URL:-}"
      SERVER_PUBLIC_IP: "${SERVER_PUBLIC_IP:-}"
      # Optional Cloudflare fallback — leave empty in sovereign mode
      CF_API_TOKEN: "${CF_API_TOKEN:-}"
      CF_ZONE_ID: "${CF_ZONE_ID:-}"
      NEXUS_DEPLOY_URL: "${NEXUS_DEPLOY_URL:-}"
      NEXUS_DEPLOY_TOKEN: "${NEXUS_DEPLOY_TOKEN:-}"
    volumes:
      - nexus_cloud_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${PORT:-8787}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nexus

  # ── Cloudflare DNS bootstrap (optional, profile: cloudflare) ─────────────────
  # Only needed during the transition window before glue records have propagated.
  # Temporarily creates nexus.cloud A <IP> and *.nexus.cloud A <IP> on Cloudflare
  # so the domain is reachable while you wait for nameserver delegation to complete.
  # Once CoreDNS is authoritative, remove CF_API_TOKEN and CF_ZONE_ID from .env.
  #
  # Usage: docker compose --profile cloudflare run --rm dns-bootstrap
  dns-bootstrap:
    image: curlimages/curl:latest
    container_name: nexus-cloud-dns-bootstrap
    profiles:
      - cloudflare
    command:
      - "-sf"
      - "-X"
      - "POST"
      - "http://nexus-cloud:${PORT:-8787}/api/v1/dns/bootstrap"
      - "-H"
      - "Authorization: Bearer ${NEXUS_CLOUD_API_KEY:-}"
      - "-H"
      - "Content-Type: application/json"
    depends_on:
      nexus-cloud:
        condition: service_healthy
    networks:
      - nexus

volumes:
  nexus_cloud_data:
  caddy_data:
  caddy_config:

networks:
  nexus:
    driver: bridge
